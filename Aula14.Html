<!DOCTYPE html>
<html lang="pt-br">

<body>
    <h1>Inserindo videos hospedados localmente</h1>
<p> Este vídeo está hospedado no meu próprio servidor.</p>
<video width="500" poster="imagens/minha imagem500.jpg" controls autoplay loop> <!--usado para fazer vídeos, whidth é a largura do vídeo, poster é a imagen que aparece como capa do vídeo controls é usado para criar os botões do vídeo, autoplay serve para fazer o vídeo iniciar automaticamente e loop serve para fazer o vídeo reiniciar automaticamente-->
<source src="midia/Meuvideo.webm.webm" type="video/webm">
<source src="meu video.mp4" type="video/mp4">
<source src="midia/meuvideo.ogv" type="video/ogv">
</video><iframe width="560" height="315" src="https://www.youtube.com/embed/sX0DRL5AVgw?si=Ky8LJQVLRqM3P6-V" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
